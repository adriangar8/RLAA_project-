<svg width="100%" viewBox="0 0 680 265" xmlns="http://www.w3.org/2000/svg" style="font-family: sans-serif; background: #1a1a2e;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#9090c0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Box 1: Expert -->
<rect x="20" y="40" width="130" height="58" rx="8" fill="#3C3489" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#CECBF6" x="85" y="62" text-anchor="middle" dominant-baseline="central">Expert</text>
<text font-size="12" fill="#AFA9EC" x="85" y="80" text-anchor="middle" dominant-baseline="central">SB3 PPO · 500k steps</text>

<!-- Arrow 1 -->
<line x1="150" y1="69" x2="165" y2="69" stroke="#9090c0" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Box 2: Demo Dataset -->
<rect x="165" y="40" width="150" height="58" rx="8" fill="#3C3489" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#CECBF6" x="240" y="62" text-anchor="middle" dominant-baseline="central">Demo dataset</text>
<text font-size="12" fill="#AFA9EC" x="240" y="80" text-anchor="middle" dominant-baseline="central">.npz · 200 eps · ~50k trans.</text>

<!-- Arrow 2 -->
<line x1="315" y1="69" x2="330" y2="69" stroke="#9090c0" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Box 3: Behavioral Cloning -->
<rect x="330" y="40" width="165" height="58" rx="8" fill="#3C3489" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#CECBF6" x="412" y="62" text-anchor="middle" dominant-baseline="central">Behavioral cloning</text>
<text font-size="12" fill="#AFA9EC" x="412" y="80" text-anchor="middle" dominant-baseline="central">50 epochs</text>

<!-- Arrow 3 -->
<line x1="495" y1="69" x2="505" y2="69" stroke="#9090c0" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Box 4: Policy Network -->
<rect x="505" y="40" width="135" height="58" rx="8" fill="#3C3489" stroke="#7F77DD" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#CECBF6" x="572" y="69" text-anchor="middle" dominant-baseline="central">Policy network</text>

<!-- Downward arrow from Policy Network -->
<line x1="572" y1="98" x2="572" y2="144" stroke="#9090c0" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- RL Fine-Tuning label -->
<text font-size="14" font-weight="500" fill="#CECBF6" x="452" y="122" text-anchor="middle">RL fine-tuning</text>

<!-- Horizontal branch line -->
<line x1="332" y1="148" x2="572" y2="148" stroke="#9090c0" stroke-width="0.5"/>

<!-- Drop arrows to each algo box -->
<line x1="332" y1="148" x2="332" y2="168" stroke="#9090c0" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="452" y1="148" x2="452" y2="168" stroke="#9090c0" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="572" y1="148" x2="572" y2="168" stroke="#9090c0" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- REINFORCE box -->
<rect x="282" y="168" width="100" height="58" rx="8" fill="#085041" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#9FE1CB" x="332" y="190" text-anchor="middle" dominant-baseline="central">REINFORCE</text>
<text font-size="12" fill="#5DCAA5" x="332" y="208" text-anchor="middle" dominant-baseline="central">5000 eps</text>

<!-- A2C box -->
<rect x="402" y="168" width="100" height="58" rx="8" fill="#085041" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#9FE1CB" x="452" y="190" text-anchor="middle" dominant-baseline="central">A2C</text>
<text font-size="12" fill="#5DCAA5" x="452" y="208" text-anchor="middle" dominant-baseline="central">500k steps</text>

<!-- PPO box -->
<rect x="522" y="168" width="100" height="58" rx="8" fill="#085041" stroke="#1D9E75" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#9FE1CB" x="572" y="190" text-anchor="middle" dominant-baseline="central">PPO</text>
<text font-size="12" fill="#5DCAA5" x="572" y="208" text-anchor="middle" dominant-baseline="central">100k steps</text>
</svg>
